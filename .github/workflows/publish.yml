name: Publish to npm

on:
  push:
    tags:
      # per-package release: @emoteer/react@0.2.0, @emoteer/theme@0.1.2, etc.
      - '@emoteer/*@*'
      # monorepo-wide release: v0.1.1 (all packages bumped in sync)
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish packages
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks
